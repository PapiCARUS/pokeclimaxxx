<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1b33" />
  <title>PokéClimax Mobile ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">POKÉCLIMAX</div>
        <h1 id="page-title">Tableau de bord</h1>
      </div>
      <button class="icon-button" aria-label="Notifications">●</button>
    </header>

    <main id="app" class="content"></main>

    <nav class="bottom-nav" aria-label="Navigation principale">
      <button class="nav-item active" data-route="home"><span>⌂</span><small>Accueil</small></button>
      <button class="nav-item" data-route="sales"><span>↗</span><small>Ventes</small></button>
      <button class="nav-item" data-route="stock"><span>□</span><small>Stock</small></button>
      <button class="nav-item" data-route="cards"><span>◇</span><small>Cartes</small></button>
      <button class="nav-item" data-route="more"><span>•••</span><small>Plus</small></button>
    </nav>
  </div>

  <div id="sheet" class="sheet-backdrop hidden" role="dialog" aria-modal="true">
    <div class="sheet-panel">
      <div class="sheet-grabber"></div>
      <div id="sheet-content"></div>
      <button class="secondary-button full" id="close-sheet">Fermer</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
