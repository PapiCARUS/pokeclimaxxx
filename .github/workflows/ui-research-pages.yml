name: Deploy UI Research Gallery to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-ui-research
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs/ui-research
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload UI research artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/ui-research

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
